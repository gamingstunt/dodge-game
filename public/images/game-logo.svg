<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Impossible Dodge logo</title>
  <desc id="desc">A neon hexagon badge with the letters ID in the center.</desc>
  <defs>
    <linearGradient id="outer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#72d4ff"/>
      <stop offset="52%" stop-color="#83f1ff"/>
      <stop offset="100%" stop-color="#ff6fb9"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09192f"/>
      <stop offset="100%" stop-color="#112a52"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path
    d="M80 10 132 40v80l-52 30-52-30V40z"
