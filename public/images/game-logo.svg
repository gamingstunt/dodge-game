  />
  <path d="M48 55h14v49H48zM68 55h16c16 0 28 11 28 24s-12 25-28 25H68z" fill="#e8fbff"/>
  <path d="M82 68h2c7 0 13 5 13 11s-6 11-13 11h-2z" fill="#70dcff"/>
