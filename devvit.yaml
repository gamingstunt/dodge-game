name: gsid-dodge
friendlyName: 'GamingStunt: Impossible Dodge'
version: 1.0.0
description: >
  A polished neon arcade runner from GamingStunt that runs inside a Reddit
  interactive post.

  Players jump past incoming hazards, chase escalating speed tiers, and watch
  the entire interface react as difficulty ramps up.

  The app uses only local bundled assets, requests no user permissions, and
  collects no personal data.

permissions: []

post:
  dir: dist/client
  entrypoints:
    default:
      entry: index.html
      height: tall
